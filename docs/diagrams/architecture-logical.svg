<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura logica da API Roguelike de Cartas</title>
  <desc id="desc">Diagrama em estilo container mostrando cliente, API Gateway, microservicos, MongoDB, Prometheus, Grafana e k6.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#166534"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .group-title { font: 700 18px Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 20px Arial, sans-serif; }
      .box-text { font: 400 15px Arial, sans-serif; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .external { fill: #eef7ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .gateway { fill: #0f5132; stroke: #0f5132; stroke-width: 2; rx: 8; }
      .service { fill: #ecfdf3; stroke: #17803d; stroke-width: 2; rx: 8; }
      .database { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .obs { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 8; }
      .system { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .line { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .green-line { fill: none; stroke: #166534; stroke-width: 2.5; marker-end: url(#arrowGreen); }
      .purple-line { fill: none; stroke: #6d28d9; stroke-width: 2.5; marker-end: url(#arrowPurple); stroke-dasharray: 8 7; }
      .label { font: 600 13px Arial, sans-serif; fill: #334155; }
      .white { fill: #ffffff; }
      .dark { fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text x="60" y="62" class="title">Arquitetura em Microservicos</text>
  <text x="60" y="94" class="subtitle">Cliente entra pelo API Gateway; os servicos internos se comunicam por HTTP e persistem no MongoDB.</text>

  <rect x="300" y="130" width="1020" height="570" class="system"/>
  <text x="330" y="164" class="group-title">API Roguelike de Cartas</text>

  <rect x="60" y="230" width="180" height="86" class="external"/>
  <text x="150" y="263" text-anchor="middle" class="box-title dark">Cliente</text>
  <text x="150" y="288" text-anchor="middle" class="box-text dark">Swagger ou app</text>

  <rect x="60" y="360" width="180" height="86" class="external"/>
  <text x="150" y="393" text-anchor="middle" class="box-title dark">k6</text>
  <text x="150" y="418" text-anchor="middle" class="box-text dark">carga e stress</text>

  <rect x="360" y="290" width="220" height="120" class="gateway"/>
  <text x="470" y="326" text-anchor="middle" class="box-title white">api-gateway</text>
  <text x="470" y="353" text-anchor="middle" class="box-text white">JWT, CORS</text>
  <text x="470" y="376" text-anchor="middle" class="box-text white">rate limit</text>
  <text x="470" y="399" text-anchor="middle" class="box-text white">Swagger e proxy</text>

  <rect x="720" y="175" width="230" height="86" class="service"/>
  <text x="835" y="207" text-anchor="middle" class="box-title dark">auth-service</text>
  <text x="835" y="232" text-anchor="middle" class="box-text dark">usuarios, login e JWT</text>

  <rect x="720" y="295" width="230" height="86" class="service"/>
  <text x="835" y="327" text-anchor="middle" class="box-title dark">catalog-service</text>
  <text x="835" y="352" text-anchor="middle" class="box-text dark">cartas, inimigos, bosses</text>

  <rect x="720" y="415" width="230" height="86" class="service"/>
  <text x="835" y="447" text-anchor="middle" class="box-title dark">game-service</text>
  <text x="835" y="472" text-anchor="middle" class="box-text dark">runs, batalhas, rewards</text>

  <rect x="720" y="535" width="230" height="86" class="service"/>
  <text x="835" y="567" text-anchor="middle" class="box-title dark">ranking-service</text>
  <text x="835" y="592" text-anchor="middle" class="box-text dark">leaderboard e stats</text>

  <path d="M1080,275 C1080,248 1260,248 1260,275 L1260,520 C1260,548 1080,548 1080,520 Z" class="database"/>
  <ellipse cx="1170" cy="275" rx="90" ry="28" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="1170" y="383" text-anchor="middle" class="box-title dark">MongoDB</text>
  <text x="1170" y="410" text-anchor="middle" class="box-text dark">banco roguelike</text>
  <text x="1170" y="434" text-anchor="middle" class="box-text dark">users, cards, runs</text>
  <text x="1170" y="458" text-anchor="middle" class="box-text dark">battles, rewards, ranking</text>

  <rect x="360" y="760" width="220" height="86" class="obs"/>
  <text x="470" y="793" text-anchor="middle" class="box-title dark">Prometheus</text>
  <text x="470" y="818" text-anchor="middle" class="box-text dark">coleta /metrics</text>

  <rect x="700" y="760" width="220" height="86" class="obs"/>
  <text x="810" y="793" text-anchor="middle" class="box-title dark">Grafana</text>
  <text x="810" y="818" text-anchor="middle" class="box-text dark">dashboard</text>

  <line x1="240" y1="273" x2="360" y2="335" class="line"/>
  <text x="268" y="286" class="label">HTTP REST /v1</text>
  <line x1="240" y1="403" x2="360" y2="365" class="line"/>
  <text x="264" y="408" class="label">simula usuarios</text>

  <line x1="580" y1="330" x2="720" y2="218" class="line"/>
  <line x1="580" y1="344" x2="720" y2="338" class="line"/>
  <line x1="580" y1="358" x2="720" y2="458" class="line"/>
  <line x1="580" y1="372" x2="720" y2="578" class="line"/>

  <path d="M835,415 C835,390 835,388 835,381" class="green-line"/>
  <text x="970" y="405" class="label">busca catalogo</text>
  <path d="M950,458 C1030,492 1030,560 950,578" class="green-line"/>
  <text x="970" y="585" class="label">evento de run finalizada</text>

  <line x1="950" y1="218" x2="1080" y2="315" class="line"/>
  <line x1="950" y1="338" x2="1080" y2="360" class="line"/>
  <line x1="950" y1="458" x2="1080" y2="405" class="line"/>
  <line x1="950" y1="578" x2="1080" y2="450" class="line"/>

  <path d="M470,760 C470,705 470,705 470,410" class="purple-line"/>
  <text x="500" y="706" class="label">scrape /metrics</text>
  <line x1="580" y1="803" x2="700" y2="803" class="purple-line"/>

  <text x="60" y="865" class="small">Legenda: setas solidas = fluxo da API; setas tracejadas = observabilidade.</text>
</svg>
