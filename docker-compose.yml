services:

  # ─── BANCO DE DADOS ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: roguelike-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init-replica:
    image: mongo:7
    container_name: roguelike-mongo-init-replica
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./infra/mongo/init-replica.js:/scripts/init-replica.js:ro
    command: ["mongosh", "mongodb://mongodb:27017/admin", "/scripts/init-replica.js"]
    restart: "no"

  # ─── SERVIÇOS ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
    container_name: roguelike-auth-service
    restart: unless-stopped
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      AUTH_SERVICE_PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/roguelike?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatorio. Copie .env.example para .env e altere o valor}
      JWT_ISSUER: ${JWT_ISSUER:-roguelike-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-roguelike-client}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET obrigatorio}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-Admin}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@email.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:?ADMIN_SEED_PASSWORD obrigatorio}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: ./services/catalog-service
    container_name: roguelike-catalog-service
    restart: unless-stopped
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      CATALOG_SERVICE_PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/roguelike?replicaSet=rs0
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET obrigatorio}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-service:
    build:
      context: ./services/game-service
    container_name: roguelike-game-service
    restart: unless-stopped
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
      catalog-service:
        condition: service_healthy
    environment:
      NODE_ENV: development
      GAME_SERVICE_PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/roguelike?replicaSet=rs0
      CATALOG_SERVICE_URL: http://catalog-service:3002
      RANKING_SERVICE_URL: http://ranking-service:3004
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET obrigatorio}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  ranking-service:
    build:
      context: ./services/ranking-service
    container_name: roguelike-ranking-service
    restart: unless-stopped
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      RANKING_SERVICE_PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/roguelike?replicaSet=rs0
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET obrigatorio}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-outbox-worker:
    profiles: ["outbox"]
    build:
      context: ./services/game-service
    container_name: roguelike-game-outbox-worker
    command: ["npm", "run", "start:worker"]
    restart: unless-stopped
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
      ranking-service:
        condition: service_healthy
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/roguelike?replicaSet=rs0
      RANKING_SERVICE_URL: http://ranking-service:3004
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET obrigatorio}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-10}
      OUTBOX_BASE_DELAY_MS: ${OUTBOX_BASE_DELAY_MS:-1000}
      OUTBOX_MAX_DELAY_MS: ${OUTBOX_MAX_DELAY_MS:-60000}
      OUTBOX_LOCK_TIMEOUT_MS: ${OUTBOX_LOCK_TIMEOUT_MS:-30000}
      OUTBOX_HTTP_TIMEOUT_MS: ${OUTBOX_HTTP_TIMEOUT_MS:-5000}
      OUTBOX_METRICS_PORT: ${OUTBOX_METRICS_PORT:-3005}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: roguelike-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      game-service:
        condition: service_healthy
      ranking-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_GATEWAY_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      CATALOG_SERVICE_URL: http://catalog-service:3002
      GAME_SERVICE_URL: http://game-service:3003
      RANKING_SERVICE_URL: http://ranking-service:3004
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatorio. Copie .env.example para .env e altere o valor}
      JWT_ISSUER: ${JWT_ISSUER:-roguelike-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-roguelike-client}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET obrigatorio}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      UPSTREAM_TIMEOUT_MS: ${UPSTREAM_TIMEOUT_MS:-5000}

  # ─── OBSERVABILIDADE ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: roguelike-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.4.2
    container_name: roguelike-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3005}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD obrigatorio}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus

volumes:
  mongodb-data:
  prometheus-data:
  grafana-data:
